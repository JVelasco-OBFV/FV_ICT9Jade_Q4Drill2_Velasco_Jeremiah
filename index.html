<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Drill2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Indie+Flower&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Questrial&family=Russo+One&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: rgb(255, 149, 0);
        }

        h1{
            font-family: Questrial, sans;
        }
        u, i, input, label, p{
            font-family: Funnel Display, sans;
        }
        #calc{
            padding: 10px;
            height: 500px;
            width: 300px;
            margin-left: 90px;
            margin-top: 100px;
            background-color: rgb(0, 0, 0);
            color: rgb(255, 225, 0);
            border-radius: 40px;
        }
        #logo{
            padding: 10px;
            height: 500px;
            margin-right: 130px;
            margin-top: 100px;
            background-color: rgb(0, 0, 0);
            color: rgb(255, 225, 0);
            border-radius: 40px;
        }
        #indexobserver{
            background-color: black;
            margin-top: 60px;
            margin-left: 200px;
            margin-right: 200px;
            border-radius: 60px;   
        }
        #truelogo{
            width: 420px;
            height: 420px;
        }
    </style>

</head>
<body>
    <div class="row d-flex" id="indexobserver">
        <div class="col-1 me-2 flex-fill" id="calc">
        <h1><b>Heat Index Observer</b></h1>
        <br>
        <details ontoggle="helpHere()">
        <summary>
            <u>Instructions</u>
        </summary>
        <br>
        <i id="help"></i>
        </details>
        <br>

        <form action="#">
            <label for="temp">Degrees in Celsius</label>
            <input type="number" class="form-control" id="temp" placeholder="Input Value in Celsius">
            <br>

            <label for="temp">Humidity</label>
            <input type="number" class="form-control" id="humid" placeholder="Input Value in Percentage">
            <br>

            <button class="btn" type="button" onclick="HeatIndex()" style="font-family: Funnel Display, sans; background-color: rgb(230, 139, 3); color: rgb(0, 0, 0);"><b>Calculate H.I.</b></button>

            <br><br>
            <p>Status: </p>
            <p id="status"><b></b></p>
        </form>
        </div>
        <div class="col-1 flex-fill" id="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/8070/8070419.png" alt="" id="truelogo">
        </div>
    </div>


    <script>
        function HeatIndex(){
            let temp, humidity, status, HI;
            temp = parseFloat(document.getElementById('temp').value);
            humidity = parseFloat(document.getElementById('humid').value);
            HI = temp + (0.33 * humidity) - 4;// heat index formula
            HI = HI.toFixed(2);
            status = "";//initialize empty value

                switch (true) {
                    case (HI <= 27):
                        status = "Comfortable/Cool";
                        break;

                    case (HI <= 32):
                        status = "Warm";
                        break;
                    
                    case (HI <= 37):
                        status = "Hot";
                        break;

                    case (HI <= 41):
                        status = "Very Hot/Caution";
                        break;

                    case (HI >= 42):
                        status = "Extreme Heat/Danger";
                        break;
                
                    default:
                        status = "Input a realistic celsius value";
                        break;
                }

            document.getElementById('status').innerHTML = "Heat Index: " + HI + "; Status: " + status;
        }

        function helpHere() {
            document.getElementById('help').innerHTML = "Input temperature in ℃ and humidity in percentage to determine the heat index in your respective location"
        }
    </script>
</body>
</html>
